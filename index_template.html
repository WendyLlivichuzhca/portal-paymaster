    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f9fafb;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
    </style>

<body class="min-h-screen flex flex-col items-center justify-center p-4">
    <div class="w-full max-w-md">
        <!-- Header -->
        <div class="text-center mb-8">
            <h1 class="text-3xl font-bold text-gray-900 mb-2">Verificación de Registro</h1>
            <p class="text-gray-600">Consulta si tu formulario ya fue enviado al Paymaster.</p>
        </div>

        <!-- Search Card -->
        <div class="glass-card shadow-xl rounded-2xl p-6 mb-6">
            <div class="space-y-4">
                <div>
                    <label for="searchInput" class="block text-sm font-medium text-gray-700 mb-1">
                        Nombre, Correo, Cédula o Telegram
                    </label>
                    <div class="relative">
                        <input type="text" id="searchInput" 
                            class="block w-full px-4 py-3 rounded-xl border-gray-200 border bg-gray-50 text-gray-900 focus:ring-2 focus:ring-blue-500 focus:border-transparent transition-all outline-none"
                            placeholder="Ej: Juan Perez o @usuario">
                    </div>
                </div>
                <button id="searchButton" 
                    class="w-full bg-blue-600 hover:bg-blue-700 text-white font-semibold py-3 px-4 rounded-xl shadow-lg shadow-blue-200 transition-all active:scale-95">
                    Buscar Registro
                </button>
            </div>
        </div>

        <!-- Results Section -->
        <div id="resultArea" class="hidden animate-fade-in">
            <div id="statusCard" class="rounded-2xl p-6 border text-center transition-all">
                <div id="iconContainer" class="mb-4 flex justify-center">
                    <!-- Icon will be injected here -->
                </div>
                <h2 id="resultTitle" class="text-xl font-bold mb-2"></h2>
                <p id="resultMessage" class="text-sm opacity-90"></p>
            </div>
        </div>

        <!-- Footer -->
        <footer class="mt-12 text-center text-gray-400 text-sm">
            &copy; 2026 Herramienta de Búsqueda de Usuarios
        </footer>
    </div>
